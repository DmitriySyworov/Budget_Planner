services:
  postgres:
    container_name: postgres-user
    image: postgres:latest
    ports:
      - "${EXTERNAL_POSTGRES_PORT}:5432"
    environment:
      POSTGRES_USER : ${POSTGRES_USER}
      POSTGRES_PASSWORD : ${POSTGRES_PASSWORD}
      POSTGRES_DB : ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      timeout: 5s
      interval: 5s
      retries: 5
    volumes:
      - ${PATH_VOLUMES}/postgres-data:/var/lib/postgresql/18/data
  redis:
    container_name: redis-auth
    image: redis:latest
    ports:
      - "${EXTERNAL_REDIS_PORT}:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - ${PATH_VOLUMES}/redis-data:/data
  migration:
    container_name: migration-auth-user
    build:
      context: ../../
      dockerfile: ./services/auth-service/Dockerfile
    entrypoint: ["./migrator"]
    environment:
      DSN : ${DSN}
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
  app:
    container_name: app-auth-user
    build:
      context: ../../
      dockerfile: ./services/auth-service/Dockerfile
    ports:
      - "${EXTERNAL_API_PORT}:8080"
    environment:
      EXTERNAL_API_PORT : ${EXTERNAL_API_PORT}
      DSN : ${DSN}
      REDIS_ADDRESS : ${REDIS_ADDRESS}
      REDIS_PASSWORD : ${REDIS_PASSWORD}
      JWT_SIGNATURE : ${JWT_SIGNATURE}
      API_EMAIL : ${API_EMAIL}
      API_PASSWORD : ${API_PASSWORD}
      SMTP_ADDRESS : ${SMTP_ADDRESS}
      SMTP_ADDRESS_HOST : ${SMTP_ADDRESS_HOST}
    depends_on:
      migration:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:
