services:
  postgres-test:
    container_name: postgres-budget-planner-test
    image: postgres:latest
    ports:
      - "${EXTERNAL_POSTGRES_PORT}:5432"
    environment:
      POSTGRES_USER : ${POSTGRES_USER}
      POSTGRES_PASSWORD : ${POSTGRES_PASSWORD}
      POSTGRES_DB : ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      timeout: 5s
      interval: 5s
      retries: 5
  migration-test:
    container_name: migration-budget-planner-test
    build:
      context: ../../
      dockerfile: ./services/budget-planner-service/Dockerfile
    entrypoint: ["./migrator"]
    environment:
      DSN : ${DSN_TEST_MIGRATION}
    restart: "no"
    depends_on:
      postgres-test:
        condition: service_healthy